services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      MANDATEMESH_DATA_DIR: /app/data
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    volumes:
      - mandatemesh-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mandatemesh-data:

